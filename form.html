<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet" href="form.css">
</head>
<body>

    


    <div class="container">

        <form id="registroForm">

            <h2>Crear Cuenta</h2>

            <input
                type="text"
                id="username"
                placeholder="Usuario"
                required>

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required>

            <button type="submit">
                Registrarse
            </button>



        </form>


        <p id="mensaje"></p>

    </div>

    <script src="form.js"></script>

</body>
</html>
